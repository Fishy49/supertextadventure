plugins:
  - rubocop-performance
  - rubocop-rails
  - rubocop-capybara

AllCops:
  SuggestExtensions: false
  NewCops: enable
  Exclude:
    - 'bin/**'
    - 'db/schema.rb'
    - 'config/routes.rb'
    - 'vendor/**/*'

Layout/IndentationConsistency:
  EnforcedStyle: indented_internal_methods

Metrics/AbcSize:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/MethodLength:
  Max: 60
  Exclude:
    - 'db/migrate/**'
    - 'db/seeds/**'

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/Documentation:
  Enabled: false

Rails/ThreeStateBooleanColumn:
  Enabled: false

Metrics/ClassLength:
  Max: 300

Metrics/PerceivedComplexity:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - 'test/**/*'
    - 'db/seeds/**'
    - 'config/environments/**'
    - 'app/controllers/**'

Layout/LineLength:
  Exclude:
    - 'db/seeds/**'
    - 'test/**/*'

Rails/I18nLocaleTexts:
  Enabled: false

Rails/ReversibleMigration:
  Enabled: false

Rails/UniqueValidationWithoutIndex:
  Enabled: false
